<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidato — Scorecard</title>
<link rel="stylesheet" href="shared/theme.css">
<script>
  // Set theme before first paint to avoid a flash of the wrong theme.
  (function(){
    try{
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(dark) document.documentElement.setAttribute('data-theme', 'dark');
    }catch(e){}
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Candidato · Scorecard</h1>
      <div class="sub">Busque um(a) deputado(a) ou senador(a), calcule o score no backend e leia o resultado armazenado em MySQL.</div>
    </div>
    <div class="header-actions">
      <div class="badge">MySQL API</div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro" title="Alternar tema"></button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tabbtn active" type="button" data-tab="busca">Busca <span class="count" id="roster-count"></span></button>
    <button class="tabbtn" type="button" data-tab="selecionado" id="tab-selecionado" hidden>Selecionado</button>
  </nav>

  <!-- TAB: Busca — search + grid of cached candidates -->
  <section id="pane-busca" class="tabpane">
    <div class="panel">
      <form id="search-form" class="search-form">
        <div class="search-field">
          <input id="candidate-query" class="search-input" placeholder="Filtre a grade ou digite um nome novo…" autocomplete="off">
        </div>
        <button id="search-button" class="primary" type="submit">Buscar</button>
        <button id="random-cached" class="secondary" type="button" title="Abre um candidato já no banco">🎲 No banco</button>
        <button id="random-new" class="secondary" type="button" title="Sorteia um deputado novo e calcula o score">🎲 Novo</button>
      </form>
      <div class="sub" style="margin-top:8px">A grade mostra quem já está no banco — digite para filtrar. Clique em <b>Buscar</b> para procurar um nome novo (Câmara → Senado).</div>
      <div id="search-results" class="results"></div>
    </div>
    <div id="grid-host"></div>
  </section>

  <!-- TAB: Selecionado — the full scorecard; tab hidden until something is selected -->
  <section id="pane-selecionado" class="tabpane" hidden>
    <button id="back-to-busca" class="linkback" type="button">← Voltar à busca</button>
    <div id="card-host"></div>
    <footer id="sources"></footer>
  </section>
</div>

<script src="shared/scorecard.js"></script>
<script>
// Live app shell. Two tabs: Busca (search + cached grid) and Selecionado (one scorecard).
// Rendering components (cardBodyHtml, candidateGridHtml, candidateCardHtml, candidateKey,
// initThemeToggle, el) come from shared/scorecard.js — this file is only state + actions + wiring.

/* ---------------- state ---------------- */
let roster = [];                      // cached candidates from /api/politics
const norm = s => (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
const byKey = k => roster.find(c => candidateKey(c) === k);

/* ---------------- data ---------------- */
async function loadRoster(){
  try{
    const res = await fetch('/api/politics');
    const payload = await res.json();
    roster = (payload.politics || []).map(p => ({
      camara_id: p.camara_id, senado_id: p.senado_id, house: p.house || 'camara',
      name: p.name, party: p.party, uf: p.uf, wealth_total: p.wealth_total,
    }));
  }catch(err){ roster = []; }
  el('roster-count').textContent = roster.length ? `(${roster.length})` : '';
  renderGrid();
}

/* ---------------- tabs ---------------- */
function selectTab(id){
  for(const b of document.querySelectorAll('.tabbtn')) b.classList.toggle('active', b.dataset.tab === id);
  el('pane-busca').hidden = id !== 'busca';
  el('pane-selecionado').hidden = id !== 'selecionado';
}

/* ---------------- Busca: grid + live filter ---------------- */
function renderGrid(){
  const q = norm(el('candidate-query').value);
  const list = q ? roster.filter(c => norm(c.name).includes(q)) : roster;
  el('grid-host').innerHTML = candidateGridHtml(list);
  for(const card of el('grid-host').querySelectorAll('.ccard')){
    card.addEventListener('click', () => loadLocal(byKey(card.dataset.key)));
  }
}

// Remote search results (deputies not yet in the bank) shown as clickable chips in the Busca tab.
function renderSearchResults(candidates){
  if(!candidates.length){ el('search-results').innerHTML = ''; return; }
  el('search-results').innerHTML = candidates.map(c =>
    `<button class="candidate" type="button" data-camara-id="${c.camara_id}">
      <b>${c.name}</b><span>${c.party || '—'} · ${c.uf || '—'} · Câmara ${c.camara_id} · calcular</span>
    </button>`).join('');
  for(const b of el('search-results').querySelectorAll('.candidate')){
    b.addEventListener('click', () => analyzeCandidate(Number(b.dataset.camaraId), b.querySelector('b').textContent));
  }
}

/* ---------------- selection (Selecionado tab) ---------------- */
function showSelected(html){
  el('card-host').innerHTML = html;
  el('tab-selecionado').hidden = false;
  selectTab('selecionado');
}
function selectLoading(name){
  showSelected(`<div class="panel"><span class="muted">Carregando ${name}…</span></div>`);
  el('sources').textContent = '';
}
function selectError(name, err){
  showSelected(`<div class="panel"><span class="error">Erro ao carregar ${name}: ${err}</span></div>`);
}
function select(card, source){
  showSelected(cardBodyHtml(card));
  el('sources').textContent = `Dados de /api/scorecards${source ? ` · ${source}` : ''} · renderizado em ${new Date().toLocaleString('pt-BR')}`;
}

/* ---------------- actions ---------------- */
// Open an already-scored person from the bank: route by house to the right cached read.
function loadLocal(c){
  if(!c) return;
  if(c.house === 'senado') return loadSenator(c.name, c.senado_id);
  return loadLocalCandidate(c.camara_id, c.name);
}

async function loadLocalCandidate(camaraId, name){
  selectLoading(name);
  try{
    const res = await fetch(`/api/scorecards/${camaraId}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não encontrado no banco local');
    select(card, 'cache local');
  }catch(err){ selectError(name, err); }
}

// Load a senator by senado_id (cached read) when known, else by name (resolve + score).
async function loadSenator(name, senadoId){
  selectLoading(name);
  try{
    const url = senadoId
      ? `/api/senators/scorecard?senado_id=${senadoId}`
      : `/api/senators/scorecard?name=${encodeURIComponent(name)}`;
    const res = await fetch(url);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não encontrado');
    select(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
  }catch(err){ selectError(name, err); }
}

// Score a deputy (new or refresh) on the backend, then select it.
async function analyzeCandidate(camaraId, name){
  selectLoading(`${name} (calculando score)`);
  try{
    const res = await fetch('/api/scorecards', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({camara_id: camaraId}),
    });
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não retornado');
    select(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
    loadRoster();  // newly-scored candidate joins the grid
  }catch(err){ selectError(name, err); }
}

// Buscar: jump to an exact cached match, else search remotely (Câmara → Senado).
function onSubmit(event){
  event.preventDefault();
  const q = el('candidate-query').value.trim();
  if(q.length < 2){ el('search-results').innerHTML = '<span class="error">Digite pelo menos 2 caracteres.</span>'; return; }
  const exact = roster.find(c => norm(c.name) === norm(q)) || roster.filter(c => norm(c.name).includes(norm(q)))[0];
  if(exact) return loadLocal(exact);
  searchRemote(q);
}

async function searchRemote(q){
  el('search-button').disabled = true;
  el('search-results').innerHTML = '<span class="muted">Buscando na Câmara…</span>';
  try{
    const res = await fetch(`/api/candidates/search?q=${encodeURIComponent(q)}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const candidates = payload.candidates || [];
    if(candidates.length){ renderSearchResults(candidates); return; }
    el('search-results').innerHTML = '<span class="muted">Nada na Câmara. Buscando no Senado e calculando…</span>';
    await searchSenator(q);
  }catch(err){
    el('search-results').innerHTML = `<span class="error">Erro na busca: ${err}</span>`;
  }finally{
    el('search-button').disabled = false;
  }
}

// Senado leg of the unified search: resolve the name to a current senator, score, select.
async function searchSenator(q){
  try{
    const res = await fetch(`/api/senators/scorecard?name=${encodeURIComponent(q)}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('vazio');
    el('search-results').innerHTML = '';
    select(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
    loadRoster();  // newly-scored senator joins the grid
  }catch(err){
    el('search-results').innerHTML = `<span class="error">Ninguém encontrado para “${q}” na Câmara nem no Senado.</span>`;
  }
}

/* ---------------- random pickers (live page only) ---------------- */
function setBusy(b){ for(const id of ['search-button','random-cached','random-new']) el(id).disabled = b; }

function randomCached(){
  if(!roster.length){ el('search-results').innerHTML = '<span class="muted">Nenhum candidato no banco ainda. Use Buscar ou 🎲 Novo.</span>'; return; }
  loadLocal(roster[Math.floor(Math.random() * roster.length)]);
}

async function fetchDeputadosPage(page){
  const url = `https://dadosabertos.camara.leg.br/api/v2/deputados?idLegislatura=57&itens=100&pagina=${page}`;
  const res = await fetch(`/proxy?url=${encodeURIComponent(url)}`);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function randomNew(){
  setBusy(true);
  selectLoading('um deputado novo (sorteando)');
  try{
    const first = await fetchDeputadosPage(1);
    const lastLink = (first.links || []).find(l => l.rel === 'last');
    const lastPage = lastLink ? (Number(new URL(lastLink.href).searchParams.get('pagina')) || 1) : 1;
    const cachedIds = new Set(roster.map(c => c.camara_id));
    for(let attempt = 0; attempt < 6; attempt++){
      const page = 1 + Math.floor(Math.random() * lastPage);
      const data = page === 1 ? first : await fetchDeputadosPage(page);
      const fresh = (data.dados || []).filter(d => !cachedIds.has(d.id));
      if(!fresh.length) continue;
      const pick = fresh[Math.floor(Math.random() * fresh.length)];
      cachedIds.add(pick.id);
      return await analyzeCandidate(pick.id, pick.nome);
    }
    selectError('sorteio', 'não consegui sortear um novo candidato (resolução TSE). Tente de novo.');
  }catch(err){
    selectError('sorteio', err);
  }finally{
    setBusy(false);
  }
}

/* ---------------- wiring ---------------- */
initThemeToggle();
el('search-form').addEventListener('submit', onSubmit);
el('candidate-query').addEventListener('input', renderGrid);
el('random-cached').addEventListener('click', randomCached);
el('random-new').addEventListener('click', randomNew);
el('back-to-busca').addEventListener('click', () => selectTab('busca'));
for(const b of document.querySelectorAll('.tabbtn')){
  b.addEventListener('click', () => { if(!b.hidden) selectTab(b.dataset.tab); });
}
loadRoster();
</script>
</body>
</html>
