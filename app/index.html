<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidato — Scorecard</title>
<link rel="stylesheet" href="shared/theme.css">
<script>
  // Set theme before first paint to avoid a flash of the wrong theme.
  (function(){
    try{
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(dark) document.documentElement.setAttribute('data-theme', 'dark');
    }catch(e){}
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Candidato · Scorecard</h1>
      <div class="sub">Busque um(a) deputado(a) ou senador(a), calcule o score no backend e leia o resultado armazenado em MySQL.</div>
    </div>
    <div class="header-actions">
      <div class="badge">MySQL API</div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro" title="Alternar tema"></button>
    </div>
  </header>

  <section class="panel">
    <form id="search-form" class="search-form">
      <div class="search-field">
        <input id="candidate-query" class="search-input" placeholder="Digite um nome, ex.: Luciano Bivar" autocomplete="off">
        <div id="suggestions" class="suggest" hidden></div>
      </div>
      <button id="search-button" class="primary" type="submit">Buscar</button>
      <button id="random-cached" class="secondary" type="button" title="Sorteia um candidato já no banco">🎲 No banco</button>
      <button id="random-new" class="secondary" type="button" title="Sorteia um deputado novo e calcula o score">🎲 Novo</button>
    </form>
    <div class="sub" style="margin-top:8px">Sugestões aparecem para candidatos já no banco local. Para um nome novo, clique em <b>Buscar</b> (consulta a Câmara).</div>
    <div id="search-results" class="results"></div>
  </section>

  <section id="state" class="panel">Carregando scorecards...</section>
  <main id="content" style="display:none">
    <div id="card-host"></div>
  </main>
  <footer id="sources"></footer>
</div>

<script src="shared/scorecard.js"></script>
<script>
// Live app shell: search the Câmara, score on the backend, render one stored scorecard.
// Shared helpers (BRL, pct, chipClass, cardBodyHtml, initThemeToggle, …) come from scorecard.js.
const form = el('search-form');
const queryInput = el('candidate-query');
const searchButton = el('search-button');
const resultsEl = el('search-results');
const suggestEl = el('suggestions');
let localCandidates = [];
let activeSuggest = -1;
let suggestMatches = [];
const norm = s => (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();

async function loadLocalRoster(){
  try{
    const res = await fetch('/api/politics');
    const payload = await res.json();
    localCandidates = (payload.politics || []).map(p => ({
      camara_id:p.camara_id, senado_id:p.senado_id, house:p.house || 'camara',
      name:p.name, party:p.party, uf:p.uf,
    }));
  }catch(err){ localCandidates = []; }
}

function matchLocal(q){
  const n = norm(q);
  if(n.length < 1) return [];
  return localCandidates.filter(c => norm(c.name).includes(n)).slice(0, 8);
}

function hideSuggest(){ suggestEl.hidden = true; suggestEl.innerHTML = ''; activeSuggest = -1; }

function renderSuggestions(q){
  const matches = matchLocal(q);
  suggestMatches = matches;
  if(!matches.length){ hideSuggest(); return; }
  activeSuggest = -1;
  suggestEl.innerHTML = matches.map((c, i) => `<button type="button" class="suggest-item" data-idx="${i}">
    <b>${c.name}</b><span>${c.party || '—'} · ${c.uf || '—'} · ${c.house === 'senado' ? 'Senado' : 'Câmara'} · já analisado</span></button>`).join('');
  const items = [...suggestEl.querySelectorAll('.suggest-item')];
  items.forEach((b, i) => b.addEventListener('mousedown', ev => { ev.preventDefault(); loadLocal(matches[i]); }));
  suggestEl.hidden = false;
}

// One entry point for an already-scored person: route by house to the right cached read.
function loadLocal(c){
  if(c.house === 'senado') return loadSenator(c.name, c.senado_id);
  return loadLocalCandidate(c.camara_id, c.name);
}

async function loadLocalCandidate(camaraId, name){
  hideSuggest();
  queryInput.value = name;
  resultsEl.innerHTML = '';
  setLoading(`Carregando ${name} do banco local...`);
  try{
    const res = await fetch(`/api/scorecards/${camaraId}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não encontrado no banco local');
    renderCard(card, 'cache local');
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao carregar ${name}: ${err}</span>`;
  }
}

// Load a senator: by senado_id (cached read) when known, else by name (resolve + score).
async function loadSenator(name, senadoId){
  hideSuggest();
  queryInput.value = name;
  resultsEl.innerHTML = '';
  setLoading(`Carregando ${name} (Senado)...`);
  try{
    const url = senadoId
      ? `/api/senators/scorecard?senado_id=${senadoId}`
      : `/api/senators/scorecard?name=${encodeURIComponent(name)}`;
    const res = await fetch(url);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não encontrado');
    renderCard(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao carregar ${name}: ${err}</span>`;
  }
}

// Random pickers (live page only): both hit the backend, so they live in the shell, not shared/.
function setBusy(b){
  for(const id of ['search-button','random-cached','random-new']) el(id).disabled = b;
}

function randomCached(){
  if(!localCandidates.length){
    setLoading('<span class="muted">Nenhum candidato no banco ainda. Use Buscar ou 🎲 Novo.</span>');
    return;
  }
  const pick = localCandidates[Math.floor(Math.random() * localCandidates.length)];
  loadLocalCandidate(pick.camara_id, pick.name);
}

async function fetchDeputadosPage(page){
  const url = `https://dadosabertos.camara.leg.br/api/v2/deputados?idLegislatura=57&itens=100&pagina=${page}`;
  const res = await fetch(`/proxy?url=${encodeURIComponent(url)}`);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function scoreNewCandidate(camaraId, name){
  setLoading(`Calculando score de ${name} (deputado novo)...`);
  try{
    const res = await fetch('/api/scorecards', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({camara_id: camaraId})
    });
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não retornado');
    queryInput.value = name;
    renderCard(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
    loadLocalRoster();  // newly-scored candidate joins the typeahead pool
    return true;
  }catch(err){ return false; }
}

async function randomNew(){
  hideSuggest();
  setBusy(true);
  setLoading('Sorteando um deputado novo...');
  try{
    const first = await fetchDeputadosPage(1);
    const lastLink = (first.links || []).find(l => l.rel === 'last');
    const lastPage = lastLink ? (Number(new URL(lastLink.href).searchParams.get('pagina')) || 1) : 1;
    const cachedIds = new Set(localCandidates.map(c => c.camara_id));
    for(let attempt = 0; attempt < 6; attempt++){
      const page = 1 + Math.floor(Math.random() * lastPage);
      const data = page === 1 ? first : await fetchDeputadosPage(page);
      const fresh = (data.dados || []).filter(d => !cachedIds.has(d.id));
      if(!fresh.length) continue;
      const pick = fresh[Math.floor(Math.random() * fresh.length)];
      cachedIds.add(pick.id);  // don't repick the same one on retry
      setLoading(`Sorteado: ${pick.nome}. Calculando score...`);
      if(await scoreNewCandidate(pick.id, pick.nome)) return;
    }
    el('state').innerHTML = '<span class="error">Não consegui sortear um novo candidato (falha de resolução TSE). Tente de novo.</span>';
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao sortear: ${err}</span>`;
  }finally{
    setBusy(false);
  }
}

function renderCard(card, source){
  el('card-host').innerHTML = cardBodyHtml(card);
  el('state').style.display = 'none';
  el('content').style.display = 'block';
  const sourceLabel = source ? ` · ${source}` : '';
  el('sources').textContent = `Dados servidos por /api/scorecards${sourceLabel} · renderizado em ${new Date().toLocaleString('pt-BR')}`;
}

function setLoading(message){
  el('content').style.display = 'none';
  el('state').style.display = 'block';
  el('state').innerHTML = message;
}

function renderCandidateResults(candidates){
  if(!candidates.length){
    resultsEl.innerHTML = '<span class="muted">Nenhum deputado encontrado.</span>';
    return;
  }
  resultsEl.innerHTML = candidates.map(c => `<button class="candidate" type="button" data-camara-id="${c.camara_id}">
    <b>${c.name}</b><span>${c.party || '—'} · ${c.uf || '—'} · Câmara ${c.camara_id}</span>
  </button>`).join('');
  for(const button of resultsEl.querySelectorAll('.candidate')){
    button.addEventListener('click', () => analyzeCandidate(Number(button.dataset.camaraId), button.querySelector('b').textContent));
  }
}

function onSubmit(event){
  event.preventDefault();
  const q = queryInput.value.trim();
  // Prefer a local (already-scored) person: load from DB, no live call.
  if(!suggestEl.hidden && suggestMatches.length){
    return loadLocal(suggestMatches[activeSuggest >= 0 ? activeSuggest : 0]);
  }
  const exact = matchLocal(q).find(c => norm(c.name) === norm(q)) || matchLocal(q)[0];
  if(exact) return loadLocal(exact);
  // No local match → search, Câmara first then Senado.
  searchCandidates(q);
}

async function searchCandidates(q){
  if(q.length < 2){
    resultsEl.innerHTML = '<span class="error">Digite pelo menos 2 caracteres.</span>';
    return;
  }
  hideSuggest();
  searchButton.disabled = true;
  resultsEl.innerHTML = '<span class="muted">Buscando na Câmara...</span>';
  try{
    const res = await fetch(`/api/candidates/search?q=${encodeURIComponent(q)}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const candidates = payload.candidates || [];
    if(candidates.length){ renderCandidateResults(candidates); return; }
    // Nothing in the Câmara → fall back to the Senado.
    await searchSenator(q);
  }catch(err){
    resultsEl.innerHTML = `<span class="error">Erro na busca: ${err}</span>`;
  }finally{
    searchButton.disabled = false;
  }
}

// Senado leg of the unified search: resolve the name to a current senator, score, render.
async function searchSenator(q){
  resultsEl.innerHTML = '<span class="muted">Nada na Câmara. Buscando no Senado e calculando...</span>';
  try{
    const res = await fetch(`/api/senators/scorecard?name=${encodeURIComponent(q)}`);
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('vazio');
    resultsEl.innerHTML = '';
    renderCard(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
    loadLocalRoster();  // so the newly-scored senator appears as a suggestion next time
  }catch(err){
    resultsEl.innerHTML = `<span class="error">Ninguém encontrado para “${q}” na Câmara nem no Senado.</span>`;
  }
}

async function analyzeCandidate(camaraId, name){
  setLoading(`Calculando score de ${name} e salvando no MySQL...`);
  try{
    const res = await fetch('/api/scorecards', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({camara_id: camaraId})
    });
    const payload = await res.json();
    if(!res.ok) throw new Error(payload.error || `HTTP ${res.status}`);
    const card = payload.scorecards?.[0];
    if(!card) throw new Error('scorecard não retornado');
    renderCard(card, payload.source === 'cache' ? 'cache MySQL' : 'calculado agora');
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao analisar ${name}: ${err}</span>`;
  }
}

async function run(){
  try{
    const res = await fetch('/api/scorecards');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    const card = payload.scorecards?.[0];
    if(!card){
      el('state').innerHTML = '<span class="muted">Nenhum score calculado no banco ainda.</span>';
      return;
    }
    renderCard(card);
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao carregar a API: ${err}</span>`;
  }
}

initThemeToggle();
form.addEventListener('submit', onSubmit);
queryInput.addEventListener('input', () => renderSuggestions(queryInput.value));
queryInput.addEventListener('focus', () => renderSuggestions(queryInput.value));
queryInput.addEventListener('blur', () => setTimeout(hideSuggest, 150));
queryInput.addEventListener('keydown', ev => {
  const items = [...suggestEl.querySelectorAll('.suggest-item')];
  if(suggestEl.hidden || !items.length) return;
  if(ev.key === 'ArrowDown'){ ev.preventDefault(); activeSuggest = Math.min(activeSuggest + 1, items.length - 1); }
  else if(ev.key === 'ArrowUp'){ ev.preventDefault(); activeSuggest = Math.max(activeSuggest - 1, 0); }
  else if(ev.key === 'Escape'){ hideSuggest(); return; }
  else return;
  items.forEach((it, i) => it.classList.toggle('active', i === activeSuggest));
});
el('random-cached').addEventListener('click', randomCached);
el('random-new').addEventListener('click', randomNew);
loadLocalRoster();
run();
</script>
</body>
</html>
