<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Topic → Laws — descoberta ao vivo</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#272e3a;--fg:#e6edf3;--muted:#8b949e;--accent:#388bfd;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 20px 100px;}
  h1{font-size:1.5em;margin:0 0 4px;}
  .sub{color:var(--muted);margin-bottom:16px;font-size:.9em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0;}
  label{display:block;color:var(--muted);font-size:.82em;text-transform:uppercase;margin-bottom:6px;}
  textarea{width:100%;min-height:96px;background:#0d1117;border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:10px;font:13px/1.5 ui-monospace,Menlo,monospace;}
  button{background:var(--accent);border:0;color:#fff;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:600;font-size:14px;}
  .muted{color:var(--muted)}
  table{width:100%;border-collapse:collapse;margin-top:6px;}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);font-size:.88em;vertical-align:top;}
  th{color:var(--muted);font-size:.76em;text-transform:uppercase;position:sticky;top:0;background:var(--card);}
  .chip{display:inline-block;padding:1px 8px;border-radius:999px;font-size:.76em;font-weight:600;white-space:nowrap;}
  .c-vot{background:rgba(46,160,67,.18);color:#3fb950;border:1px solid #2ea04355;}
  .c-no{background:rgba(72,79,88,.25);color:#8b949e;border:1px solid #484f58;}
  .c-pend{background:rgba(56,139,253,.15);color:#79c0ff;border:1px solid #388bfd55;}
  a{color:#79c0ff;text-decoration:none}a:hover{text-decoration:underline}
  .stat{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0}
  .stat b{font-size:1.3em}
  .step{font-size:.82em;color:var(--muted)}
  code{background:#21262d;padding:1px 5px;border-radius:4px;font-size:.85em}
</style>
</head>
<body>
<div class="wrap">
  <h1>Topic → Laws <span class="muted" style="font-size:.62em">descoberta ao vivo</span></h1>
  <div class="sub">Insira os <b>descritores de vocabulário controlado</b> do tema. A página consulta
  <code>/proposicoes?keywords=</code> na Câmara (ao vivo), une os resultados e mostra <b>todas</b>
  as leis — marcando quais foram efetivamente <b>votadas</b> em plenário.</div>

  <div class="card">
    <label>Descritores do tema (um por linha) — pré-preenchidos com "tributação de riqueza/renda" (derivados da indexação de projetos-semente)</label>
    <textarea id="terms">Imposto sobre Grandes Fortunas (IGF)
dividendos
ganho de capital
Juros sobre capital próprio
Imposto sobre a Renda da Pessoa Física (IRPF)
Fundo de investimento
Contribuição Social sobre o Lucro Líquido (CSLL)
Imposto sobre a Renda e Proventos de Qualquer Natureza (IR)</textarea>
    <div style="margin-top:10px;display:flex;gap:10px;align-items:center">
      <button id="go">Descobrir leis</button>
      <span class="muted">anos: <input id="anos" value="2019-2025" style="width:90px;background:#0d1117;border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:4px 6px"></span>
      <span id="status" class="step"></span>
    </div>
  </div>

  <div class="card">
    <div class="stat" id="stats"></div>
    <div style="max-height:62vh;overflow:auto">
    <table id="tbl"><thead><tr><th>Proposição</th><th>Ementa</th><th>Encontrada por</th><th>Votada?</th></tr></thead><tbody id="tb"></tbody></table>
    </div>
  </div>
</div>

<script>
const C='https://dadosabertos.camara.leg.br/api/v2';
const px=async u=>{for(let i=0;i<4;i++){try{const r=await fetch('/proxy?url='+encodeURIComponent(u));return await r.json();}catch(e){await new Promise(s=>setTimeout(s,800));}}return{dados:[]}};
const el=id=>document.getElementById(id);
async function pool(items,fn,conc=6){const out=[];let i=0;await Promise.all(Array.from({length:Math.min(conc,items.length)},async()=>{while(i<items.length){const k=i++;try{out[k]=await fn(items[k])}catch(e){out[k]=null}}}));return out;}

async function discover(){
  const terms=el('terms').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const [y0,y1]=el('anos').value.split('-').map(s=>parseInt(s.trim()));
  const years=[];for(let y=y0;y<=y1;y++)years.push(y);
  el('tb').innerHTML='';el('stats').innerHTML='';
  el('status').textContent=`consultando ${terms.length} descritores × ${years.length} anos…`;

  // 1) live keyword searches → union of proposições
  const found={};   // id -> {prop, terms:Set}
  const queries=[];
  for(const t of terms) for(const y of years) queries.push({t,y});
  await pool(queries, async ({t,y})=>{
    const d=(await px(`${C}/proposicoes?keywords=${encodeURIComponent(t)}&ano=${y}&itens=50&ordem=DESC&ordenarPor=id`)).dados||[];
    for(const p of d){ if(!found[p.id]) found[p.id]={prop:p,terms:new Set()}; found[p.id].terms.add(t); }
  }, 6);
  let list=Object.values(found);
  el('status').textContent=`${list.length} leis encontradas. Verificando quais foram votadas…`;

  // render immediately (voted = pending), then enrich
  list.sort((a,b)=> (b.prop.ano-a.prop.ano) || (b.prop.id-a.prop.id));
  const rowById={};
  el('tb').innerHTML=list.map(x=>{
    const p=x.prop;const t=p.siglaTipo+' '+p.numero+'/'+p.ano;
    return `<tr id="r${p.id}"><td><a href="https://www.camara.leg.br/propostas-legislativas/${p.id}" target="_blank"><b>${t}</b></a></td>
      <td>${(p.ementa||'').slice(0,150)}</td>
      <td class="muted">${[...x.terms].slice(0,3).join(', ')}</td>
      <td><span class="chip c-pend">…</span></td></tr>`;
  }).join('');
  stats(list,null);

  // 2) enrich: which were voted (nominal roll-call)?
  let votedCount=0, done=0;
  await pool(list, async (x)=>{
    const vs=(await px(`${C}/proposicoes/${x.prop.id}/votacoes`)).dados||[];
    const nom=vs.filter(v=>/Sim:/.test(v.descricao||''));
    x.voted=nom.length; if(nom.length)votedCount++;
    const cell=el('r'+x.prop.id).lastElementChild;
    cell.innerHTML = nom.length? `<span class="chip c-vot">${nom.length} votação(ões)</span>` : `<span class="chip c-no">não votada</span>`;
    done++; if(done%10===0||done===list.length){el('status').textContent=`${done}/${list.length} verificadas · ${votedCount} votadas`;stats(list,votedCount);}
  }, 6);
  el('status').textContent=`Pronto: ${list.length} leis, ${votedCount} com votação nominal.`;
  // sort voted to top
  const tb=el('tb');[...list].sort((a,b)=>(b.voted||0)-(a.voted||0)||b.prop.ano-a.prop.ano).forEach(x=>tb.appendChild(el('r'+x.prop.id)));
  stats(list,votedCount);
}
function stats(list,voted){
  const byType={};list.forEach(x=>byType[x.prop.siglaTipo]=(byType[x.prop.siglaTipo]||0)+1);
  el('stats').innerHTML=`<div><b>${list.length}</b><br><span class="muted">leis encontradas</span></div>
    <div><b>${voted===null?'…':voted}</b><br><span class="muted">votadas em plenário</span></div>
    <div><b>${Object.entries(byType).map(([k,v])=>k+':'+v).join('  ')}</b><br><span class="muted">por tipo</span></div>`;
}
el('go').onclick=discover;
discover();  // run on load
</script>
</body>
</html>
