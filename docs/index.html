<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidato — Scorecards</title>
<link rel="stylesheet" href="shared/theme.css">
<script>
  // Set theme before first paint to avoid a flash of the wrong theme.
  (function(){
    try{
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(dark) document.documentElement.setAttribute('data-theme', 'dark');
    }catch(e){}
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Candidato · Scorecards</h1>
      <div class="sub">Como deputados(as) votaram nas leis que mexem com o próprio patrimônio. Snapshot público, sem servidor.</div>
    </div>
    <div class="header-actions">
      <div id="snapshot-badge" class="badge">snapshot</div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro" title="Alternar tema"></button>
    </div>
  </header>

  <nav id="nav" class="nav" style="display:none"></nav>

  <section id="state" class="panel">Carregando scorecards…</section>
  <main id="cards"></main>

  <footer id="sources"></footer>
</div>

<script src="shared/scorecard.js"></script>
<script>
// Static GitHub Pages shell: load the baked snapshot, render every candidate, show one
// at a time via the nav (hash). Shared helpers (cardBodyHtml, slugify, initThemeToggle,
// …) come from scorecard.js.
function renderCardBlock(card){
  const p = card.politic;
  const anchor = slugify(p.name, p.camara_id);
  const block = document.createElement('article');
  block.className = 'card-block';
  block.id = anchor;
  block.innerHTML = cardBodyHtml(card);
  return { block, anchor };
}

function renderNav(cards, anchors){
  const links = cards.map((card, i) => {
    const p = card.politic;
    return `<a href="#${anchors[i]}">${p.name} <span class="muted">· ${p.party || '—'}/${p.uf || '—'}</span></a>`;
  }).join('');
  el('nav').innerHTML = `<span class="navlabel">Candidatos</span>${links}`;
  el('nav').style.display = 'flex';
}

// Show only the card matching the current hash (default: first card).
function showCard(){
  const blocks = [...el('cards').querySelectorAll('.card-block')];
  if(!blocks.length) return;
  const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
  const active = blocks.find(b => b.id === hash) || blocks[0];
  blocks.forEach(b => b.classList.toggle('active', b === active));
  for(const a of el('nav').querySelectorAll('a')){
    a.classList.toggle('active', a.getAttribute('href') === '#' + active.id);
  }
}

async function run(){
  try{
    const res = await fetch('./data/scorecards.json');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    const cards = payload.scorecards || [];
    if(!cards.length){
      el('state').innerHTML = '<span class="muted">Nenhum scorecard disponível neste snapshot.</span>';
      return;
    }
    const container = el('cards');
    container.innerHTML = '';
    const anchors = [];
    for(const card of cards){
      const { block, anchor } = renderCardBlock(card);
      container.appendChild(block);
      anchors.push(anchor);
    }
    if(cards.length > 1) renderNav(cards, anchors);
    showCard();
    window.addEventListener('hashchange', showCard);
    el('state').style.display = 'none';
    const when = payload.generated_at ? new Date(payload.generated_at).toLocaleString('pt-BR') : '—';
    el('snapshot-badge').textContent = `${cards.length} candidato${cards.length === 1 ? '' : 's'}`;
    el('sources').textContent = `Snapshot estático · ${cards.length} candidato(s) · gerado em ${when}`;
  }catch(err){
    el('state').innerHTML = `<span class="error">Erro ao carregar os dados: ${err}</span>`;
  }
}

initThemeToggle();
run();
</script>
</body>
</html>
