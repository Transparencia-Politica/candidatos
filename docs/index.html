<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidato — Scorecards</title>
<link rel="stylesheet" href="shared/theme.css?v=bfd9f9cdf7">
<script>
  // Set theme before first paint to avoid a flash of the wrong theme.
  (function(){
    try{
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(dark) document.documentElement.setAttribute('data-theme', 'dark');
    }catch(e){}
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 data-i18n="pageTitleStatic">Candidato · Scorecards</h1>
      <div class="sub" data-i18n="pageSubtitleStatic">Como deputados(as) e senadores(as) votaram nas leis de tributação da riqueza: tributação progressiva ou proteção da concentração. Snapshot público, sem servidor.</div>
    </div>
    <div class="header-actions">
      <div id="snapshot-badge" class="badge" data-i18n="snapshotBadge">snapshot</div>
      <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Switch language" title="Switch language"></button>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro" title="Alternar tema"></button>
    </div>
  </header>

  <!-- Busca: filter panel + opinion legend + results grid -->
  <section id="pane-busca">
    <div id="rubric-host"></div>
    <details id="filters-panel" class="panel collapse-panel" open>
      <summary><span data-i18n="filtersTitle">Filtros</span><span class="muted" data-i18n="filtersSubtitle">buscar, ordenar e combinar critérios</span></summary>
      <div id="filters-host"></div>
    </details>
    <div id="legend-host"></div>
    <div id="grid-host"></div>
  </section>

  <!-- Detalhe: one full scorecard, read straight from the snapshot (no fetch) -->
  <section id="pane-detalhe" hidden>
    <button id="back" class="linkback" type="button" data-i18n="detailBack">← Voltar à busca</button>
    <div id="card-host"></div>
  </section>

  <section id="state" class="panel" data-i18n="loadingScorecards">Carregando scorecards…</section>
  <footer id="sources"></footer>
</div>

<script src="shared/scorecard.js?v=bfd9f9cdf7"></script>
<script>
// Static GitHub Pages shell. Loads the baked snapshot once, then filters it entirely client-side
// (filterRoster) and renders the full scorecard from the same data on click — no backend.
// Filter logic + controls (filterControlsHtml, rosterEntry, rosterFacets, candidateGridHtml,
// cardBodyHtml) live in the shared scorecard module — this file is only state + wiring.

let scorecards = [];              // full baked scorecards from the snapshot
let entries = [];                 // lightweight, filterable roster entries
const cardByKey = new Map();      // key -> full scorecard (for the detail view)
const weightOverrides = {};       // law slug -> custom weight used only in this browser session
const draftWeightOverrides = {};  // edited weights, applied only when the user clicks the button
const filters = {
  query: '', house: 'all', parties: [], ufs: [],
  wealthMin: null, wealthMax: null, showUnknownWealth: true,
  govMin: null, voteLaw: '', voteValue: '', opinionMin: null, opinionMax: null, sort: 'name',
};

/* ---------------- views ---------------- */
function showBusca(){ el('pane-busca').hidden = false; el('pane-detalhe').hidden = true; }
function showDetalhe(card){
  el('card-host').innerHTML = cardBodyHtml(card, { weightOverrides });
  el('pane-busca').hidden = true; el('pane-detalhe').hidden = false;
  window.scrollTo(0, 0);
}

/* ---------------- grid ---------------- */
function renderGrid(){
  const list = filterRoster(entries, filters);
  el('f-count').textContent = `${list.length} de ${entries.length}`;
  el('grid-host').innerHTML = candidateGridHtml(list);
  for(const tile of el('grid-host').querySelectorAll('.ccard')){
    tile.addEventListener('click', () => {
      const card = cardByKey.get(tile.dataset.key);
      if(card) showDetalhe(card);
    });
  }
}

function rebuildEntries(){
  cardByKey.clear();
  entries = scorecards.map(c => {
    const e = rosterEntry(c, weightOverrides);
    cardByKey.set(e.key, c);
    return e;
  });
}

function renderRubric(){
  el('rubric-host').innerHTML = scoringRubricHtml(scorecards[0]?.topics || [], {
    interactive: true,
    weightOverrides: draftWeightOverrides,
    hasDraftChanges: weightsChanged(),
    collapseKey: 'criteria-weights',
  });
  wireDetailsState(el('rubric-host').querySelector('[data-collapse-key]'), 'criteria-weights', false);
}

function applyWeightChange(control, action){
  const slug = control.dataset.lawWeight;
  const fallback = Number(control.dataset.defaultWeight);
  const current = Object.prototype.hasOwnProperty.call(draftWeightOverrides, slug)
    ? Number(draftWeightOverrides[slug])
    : fallback;
  if(action.reset) delete draftWeightOverrides[slug];
  else if(action.flip) draftWeightOverrides[slug] = Number((-current).toFixed(2));
  else draftWeightOverrides[slug] = Number((current + action.delta).toFixed(2));
  renderRubric();
}

function wireRubricControls(){
  el('rubric-host').addEventListener('click', e => {
    const resetAll = e.target.closest('[data-weight-reset-all]');
    if(resetAll){
      for(const key of Object.keys(draftWeightOverrides)) delete draftWeightOverrides[key];
      renderRubric();
      return;
    }
    const apply = e.target.closest('[data-weight-apply]');
    if(apply){
      for(const key of Object.keys(weightOverrides)) delete weightOverrides[key];
      for(const [key, value] of Object.entries(draftWeightOverrides)) weightOverrides[key] = value;
      rebuildEntries();
      renderGrid();
      renderRubric();
      return;
    }
    const control = e.target.closest('[data-law-weight]');
    if(!control) return;
    const deltaButton = e.target.closest('[data-weight-delta]');
    if(deltaButton) return applyWeightChange(control, { delta: Number(deltaButton.dataset.weightDelta) });
    if(e.target.closest('[data-weight-flip]')) return applyWeightChange(control, { flip: true });
    if(e.target.closest('[data-weight-reset]')) return applyWeightChange(control, { reset: true });
  });
}

function weightsChanged(){
  const keys = new Set([...Object.keys(weightOverrides), ...Object.keys(draftWeightOverrides)]);
  for(const key of keys){
    if(Number(weightOverrides[key]) !== Number(draftWeightOverrides[key])) return true;
  }
  return false;
}

function storageGet(key){
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}

function storageSet(key, value){
  try{ localStorage.setItem(key, value); }catch(e){}
}

function wireDetailsState(details, key, defaultOpen){
  if(!details) return;
  const stored = storageGet(`collapse:${key}`);
  details.open = stored === null ? defaultOpen : stored === 'open';
  details.addEventListener('toggle', () => {
    storageSet(`collapse:${key}`, details.open ? 'open' : 'closed');
  }, { once: false });
}

/* ---------------- filter wiring ---------------- */
const numOrNull = v => v.trim() === '' ? null : Number(v);
function toggleInSet(arr, val){
  const i = arr.indexOf(val);
  if(i === -1) arr.push(val); else arr.splice(i, 1);
}

function wireFilters(){
  el('f-query').addEventListener('input', e => { filters.query = normName(e.target.value); renderGrid(); });
  el('f-sort').addEventListener('change', e => { filters.sort = e.target.value; renderGrid(); });
  el('f-house').addEventListener('click', e => {
    const b = e.target.closest('button[data-house]'); if(!b) return;
    filters.house = b.dataset.house;
    for(const x of el('f-house').children) x.classList.toggle('on', x === b);
    renderGrid();
  });
  const wireChips = (hostId, key) => el(hostId).addEventListener('click', e => {
    const c = e.target.closest('.fchip'); if(!c) return;
    toggleInSet(filters[key], c.dataset[key === 'parties' ? 'party' : 'uf']);
    c.classList.toggle('on');
    renderGrid();
  });
  wireChips('f-parties', 'parties');
  wireChips('f-ufs', 'ufs');
  el('f-wmin').addEventListener('input', e => { filters.wealthMin = numOrNull(e.target.value); renderGrid(); });
  el('f-wmax').addEventListener('input', e => { filters.wealthMax = numOrNull(e.target.value); renderGrid(); });
  el('f-unknown').addEventListener('change', e => { filters.showUnknownWealth = e.target.checked; renderGrid(); });
  el('f-gov').addEventListener('input', e => { filters.govMin = numOrNull(e.target.value); renderGrid(); });
  el('f-law').addEventListener('change', e => { filters.voteLaw = e.target.value; renderGrid(); });
  el('f-vote').addEventListener('change', e => { filters.voteValue = e.target.value; renderGrid(); });
  el('f-opmin').addEventListener('input', e => { filters.opinionMin = numOrNull(e.target.value); renderGrid(); });
  el('f-opmax').addEventListener('input', e => { filters.opinionMax = numOrNull(e.target.value); renderGrid(); });
  el('f-clear').addEventListener('click', () => {
    Object.assign(filters, { query:'', house:'all', parties:[], ufs:[], wealthMin:null, wealthMax:null,
      showUnknownWealth:true, govMin:null, voteLaw:'', voteValue:'', opinionMin:null, opinionMax:null, sort:'name' });
    // reset controls
    el('f-query').value=''; el('f-sort').value='name'; el('f-wmin').value=''; el('f-wmax').value='';
    el('f-gov').value=''; el('f-law').value=''; el('f-vote').value=''; el('f-unknown').checked=true;
    el('f-opmin').value=''; el('f-opmax').value='';
    for(const x of el('f-house').children) x.classList.toggle('on', x.dataset.house==='all');
    for(const c of document.querySelectorAll('.fchip.on')) c.classList.remove('on');
    renderGrid();
  });
}

/* ---------------- load ---------------- */
async function run(){
  try{
    // Cache-bust the snapshot too: GitHub Pages caches it, so a returning visitor can otherwise
    // get a stale roster (e.g. an old 3-candidate snapshot). Bump ?v= whenever the data is re-baked.
    const res = await fetch('./data/scorecards.json?v=bfd9f9cdf7');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    scorecards = payload.scorecards || [];
    if(!scorecards.length){
      el('state').innerHTML = `<span class="muted">${tr('loadingEmpty')}</span>`;
      return;
    }
    rebuildEntries();
    el('filters-host').innerHTML = filterControlsHtml(rosterFacets(entries));
    el('legend-host').innerHTML = opinionLegendHtml();
    renderRubric();
    wireRubricControls();
    wireFilters();
    renderGrid();
    el('back').addEventListener('click', showBusca);
    el('state').style.display = 'none';
    const when = payload.generated_at ? new Date(payload.generated_at).toLocaleString('pt-BR') : '—';
    el('snapshot-badge').textContent = `${scorecards.length} no banco`;
    el('sources').textContent = tr('snapshotFooter', scorecards.length, when);
  }catch(err){
    el('state').innerHTML = `<span class="error">${tr('loadError', err)}</span>`;
  }
}

initThemeToggle();
initLanguageToggle();
wireDetailsState(el('filters-panel'), 'filters', true);
run();
</script>
</body>
</html>
